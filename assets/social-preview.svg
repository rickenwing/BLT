<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E1A"/>
      <stop offset="1" stop-color="#131C32"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#10B981" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mesh" x1="0.1" y1="0.2" x2="0.9" y2="0.8">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="0.55" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="node" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="640" fill="url(#bg)"/>
  <circle cx="360" cy="320" r="320" fill="url(#halo)"/>

  <!-- infinity mark (the 1024 design, scaled + moved left) -->
  <g transform="translate(82.6,30.6) scale(0.566)">
    <g filter="url(#glow)" opacity="0.5">
      <path d="M512 512 C596 424 740 424 740 512 C740 600 596 600 512 512
               C428 424 284 424 284 512 C284 600 428 600 512 512 Z"
            fill="none" stroke="url(#mesh)" stroke-width="48" stroke-linecap="round"/>
    </g>
    <path d="M512 512 C596 424 740 424 740 512 C740 600 596 600 512 512
             C428 424 284 424 284 512 C284 600 428 600 512 512 Z"
          fill="none" stroke="url(#mesh)" stroke-width="46" stroke-linecap="round"/>
    <g fill="url(#node)" stroke="#0C1424" stroke-width="4">
      <circle cx="740" cy="512" r="26"/>
      <circle cx="284" cy="512" r="26"/>
      <circle cx="657" cy="446" r="23"/>
      <circle cx="657" cy="578" r="23"/>
      <circle cx="367" cy="446" r="23"/>
      <circle cx="367" cy="578" r="23"/>
      <circle cx="512" cy="512" r="34"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="656" y="300" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="700" fill="#F1F5F9">Buttz LAN Tool</text>
  <text x="658" y="356" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#5EEAD4" letter-spacing="1">LAN-only game &amp; file distribution</text>
  <text x="658" y="397" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#64748B" letter-spacing="1">peer-to-peer &#183; shared pool &#183; jukebox</text>
</svg>
