<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0E1A"/>
      <stop offset="1" stop-color="#131C32"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#10B981" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mesh" x1="0.1" y1="0.2" x2="0.9" y2="0.8">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="0.55" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="node" cx="0.5" cy="0.38" r="0.62">
      <stop offset="0" stop-color="#F0FFFD"/>
      <stop offset="0.6" stop-color="#A7F3E4"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="13"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="208" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="380" fill="url(#halo)"/>

  <!-- the infinity path, defined once -->
  <defs>
    <path id="inf" d="M512 512 C596 424 740 424 740 512 C740 600 596 600 512 512
                      C428 424 284 424 284 512 C284 600 428 600 512 512 Z"/>
  </defs>

  <!-- soft glow underlay (separate, low opacity — no double-image ghosting) -->
  <use href="#inf" fill="none" stroke="url(#mesh)" stroke-width="48"
       stroke-linecap="round" filter="url(#soft)" opacity="0.5"/>
  <!-- crisp stroke on top -->
  <use href="#inf" fill="none" stroke="url(#mesh)" stroke-width="46" stroke-linecap="round"/>

  <!-- peer nodes riding the curve -->
  <g fill="url(#node)" stroke="#0C1424" stroke-width="4">
    <circle cx="740" cy="512" r="26"/>
    <circle cx="284" cy="512" r="26"/>
    <circle cx="657" cy="446" r="23"/>
    <circle cx="657" cy="578" r="23"/>
    <circle cx="367" cy="446" r="23"/>
    <circle cx="367" cy="578" r="23"/>
    <circle cx="512" cy="512" r="34"/>
  </g>
</svg>
